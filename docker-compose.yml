services:
  web:
    build: .
    ports:
      - '8080:80'
    environment:
      DB_DRIVER: sqlite
      DB_DATABASE: database/app.sqlite
    volumes:
      - ./database:/var/www/html/database

  db:
    image: postgres:15
    profiles: ["postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexa_growth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/schema-postgres.sql:/docker-entrypoint-initdb.d/schema-postgres.sql:ro

volumes:
  db_data:
