services:
  web:
    build: .
    ports:
      - '8080:80'
    environment:
      DB_DRIVER: pgsql
      DB_HOST: db
      DB_PORT: '5432'
      DB_NAME: nexa_growth
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      - db

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexa_growth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/schema-postgres.sql:/docker-entrypoint-initdb.d/schema-postgres.sql:ro

volumes:
  db_data:
